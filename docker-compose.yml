services:
  database:
    image: mongo:latest
    container_name: expense-tracker-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: expense-tracker-api
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://database:27017/expense-tracker
      - PORT=5000
    depends_on:
      - database
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: expense-tracker-ui
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
